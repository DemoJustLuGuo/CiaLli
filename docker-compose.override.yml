services:
  proxy:
    environment:
      CADDY_ADDITIONAL_SITE_ADDRESS: "${CADDY_ADDITIONAL_SITE_ADDRESS:-http://}"

  web:
    build:
      target: deps
    command:
      ["pnpm", "exec", "astro", "dev", "--host", "0.0.0.0", "--port", "4321"]
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

  worker:
    build:
      target: deps
    command: ["pnpm", "exec", "tsx", "watch", "src/worker/ai-summary/server.ts"]
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules

volumes:
  web_node_modules:
  worker_node_modules:
