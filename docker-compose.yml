services:
  proxy:
    image: caddy:2.10-alpine
    depends_on:
      web:
        condition: service_started
    environment:
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost}
      CADDY_ADDITIONAL_SITE_ADDRESS: ${CADDY_ADDITIONAL_SITE_ADDRESS:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
      args:
        APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost}
    command: ["node", "./dist/server/entry.mjs"]
    depends_on:
      directus:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost}
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_WEB_STATIC_TOKEN: ${DIRECTUS_WEB_STATIC_TOKEN}
      PUBLIC_ASSET_BASE_URL: ${PUBLIC_ASSET_BASE_URL:-}
      APP_SECRET_ENCRYPTION_KEY: ${APP_SECRET_ENCRYPTION_KEY:-}
      REDIS_URL: redis://redis:6379/0
      AI_SUMMARY_INTERNAL_SECRET: ${AI_SUMMARY_INTERNAL_SECRET}
      AI_SUMMARY_PROVIDER_TIMEOUT_MS: ${AI_SUMMARY_PROVIDER_TIMEOUT_MS:-90000}
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-runtime
      args:
        APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost}
    command: ["node", "./dist/worker/entry.mjs"]
    depends_on:
      directus:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost}
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_WORKER_STATIC_TOKEN: ${DIRECTUS_WORKER_STATIC_TOKEN}
      AI_SUMMARY_INTERNAL_SECRET: ${AI_SUMMARY_INTERNAL_SECRET}
      REDIS_URL: redis://redis:6379/0
      APP_SECRET_ENCRYPTION_KEY: ${APP_SECRET_ENCRYPTION_KEY:-}
      AI_SUMMARY_PROVIDER_TIMEOUT_MS: ${AI_SUMMARY_PROVIDER_TIMEOUT_MS:-90000}
      FILE_GC_INTERVAL_MS: ${FILE_GC_INTERVAL_MS:-900000}
      FILE_GC_RETENTION_HOURS: ${FILE_GC_RETENTION_HOURS:-168}
      FILE_GC_QUARANTINE_DAYS: ${FILE_GC_QUARANTINE_DAYS:-7}
      FILE_GC_BATCH_SIZE: ${FILE_GC_BATCH_SIZE:-200}
      FILE_GC_DELETE_MAX_ATTEMPTS: ${FILE_GC_DELETE_MAX_ATTEMPTS:-6}
      FILE_DETACH_JOB_INTERVAL_MS: ${FILE_DETACH_JOB_INTERVAL_MS:-60000}
      FILE_DETACH_JOB_BATCH_SIZE: ${FILE_DETACH_JOB_BATCH_SIZE:-50}
      FILE_DETACH_JOB_LEASE_SECONDS: ${FILE_DETACH_JOB_LEASE_SECONDS:-300}
      FILE_LIFECYCLE_RECONCILE_INTERVAL_MS: ${FILE_LIFECYCLE_RECONCILE_INTERVAL_MS:-86400000}
      FILE_REFERENCE_SHADOW_INTERVAL_MS: ${FILE_REFERENCE_SHADOW_INTERVAL_MS:-86400000}
    restart: unless-stopped

  postgres:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-directus}
      POSTGRES_USER: ${POSTGRES_USER:-directus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready --host=127.0.0.1 --username=$${POSTGRES_USER} --dbname=$${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/cmdline"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done &&
        mc mb --ignore-existing local/cialli-assets
    restart: "no"

  seed-postgres-restore:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-directus}
      POSTGRES_USER: ${POSTGRES_USER:-directus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
    entrypoint:
      - /bin/sh
      - -ceu
      - |
        SEED_FILE="/seed/postgres/demo.dump"
        if [ ! -f "$$SEED_FILE" ]; then
          echo "[seed-postgres-restore] seed dump not found: $$SEED_FILE" >&2
          exit 1
        fi
        if head -n 1 "$$SEED_FILE" 2>/dev/null | grep -q "version https://git-lfs.github.com/spec/v1"; then
          echo "[seed-postgres-restore] seed dump is still a Git LFS pointer; run git lfs pull first." >&2
          exit 1
        fi
        HAS_SITE_SETTINGS_TABLE="$$(PGPASSWORD="$$POSTGRES_PASSWORD" psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -At -c "
        select case
          when exists (
            select 1
            from pg_tables
            where schemaname = 'public' and tablename = 'app_site_settings'
          ) then 'yes'
          else 'no'
        end;
        ")"
        if [ "$$HAS_SITE_SETTINGS_TABLE" = "yes" ]; then
          RESTORE_REQUIRED="$$(PGPASSWORD="$$POSTGRES_PASSWORD" psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -At -c "
        select case
          when exists (select 1 from app_site_settings where key = 'default') then 'no'
          else 'yes'
        end;
        ")"
        else
          RESTORE_REQUIRED="yes"
        fi
        if [ "$$RESTORE_REQUIRED" != "yes" ]; then
          echo "[seed-postgres-restore] existing business data detected; skip restore."
          exit 0
        fi
        echo "[seed-postgres-restore] restoring demo PostgreSQL seed into $$POSTGRES_DB."
        PGPASSWORD="$$POSTGRES_PASSWORD" psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -c "
        drop schema if exists public cascade;
        create schema public;
        "
        PGPASSWORD="$$POSTGRES_PASSWORD" pg_restore -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" --clean --if-exists --no-owner --no-privileges "$$SEED_FILE"
        echo "[seed-postgres-restore] done"
    volumes:
      - ./seed:/seed:ro
    restart: "no"

  seed-minio-restore:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: cialli-assets
    entrypoint:
      - /bin/sh
      - -ceu
      - |
        SEED_DIR="/seed/minio/demo-bucket"
        if [ ! -d "$$SEED_DIR" ]; then
          echo "[seed-minio-restore] seed directory not found: $$SEED_DIR; treat as empty seed and skip restore."
          exit 0
        fi
        if grep -R -m 1 -l "version https://git-lfs.github.com/spec/v1" "$$SEED_DIR" >/dev/null 2>&1; then
          echo "[seed-minio-restore] seed objects are still Git LFS pointers; run git lfs pull first." >&2
          exit 1
        fi
        set -- "$$SEED_DIR"/*
        if [ "$$1" = "$$SEED_DIR/*" ]; then
          echo "[seed-minio-restore] seed directory is empty; skip restore."
          exit 0
        fi
        mc alias set target http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1
        mc mb --ignore-existing "target/$$MINIO_BUCKET" >/dev/null 2>&1
        OBJECT_COUNT="$$(mc ls --recursive "target/$$MINIO_BUCKET" | wc -l | tr -d ' ')"
        if [ "$${OBJECT_COUNT:-0}" != "0" ]; then
          echo "[seed-minio-restore] bucket already has objects; skip restore."
          exit 0
        fi
        mc mirror --overwrite "$$SEED_DIR" "target/$$MINIO_BUCKET"
        echo "[seed-minio-restore] done"
    volumes:
      - ./seed:/seed:ro
    restart: "no"

  directus:
    image: directus/directus:11.10.2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed-postgres-restore:
        condition: service_completed_successfully
      seed-minio-restore:
        condition: service_completed_successfully
    command:
      - /bin/sh
      - -ceu
      - |
        npx directus bootstrap --skipAdminInit
        exec npx directus start
    environment:
      SECRET: ${DIRECTUS_SECRET:-change-me}
      PUBLIC_URL: http://127.0.0.1:8055

      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-directus}
      DB_USER: ${POSTGRES_USER:-directus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus}

      CACHE_ENABLED: "true"
      CACHE_AUTO_PURGE: "true"
      CACHE_STORE: redis
      REDIS: redis://redis:6379

      WEBSOCKETS_ENABLED: "true"

      STORAGE_LOCATIONS: s3
      STORAGE_S3_DRIVER: s3
      STORAGE_S3_KEY: ${STORAGE_S3_KEY:-minioadmin}
      STORAGE_S3_SECRET: ${STORAGE_S3_SECRET:-minioadmin}
      STORAGE_S3_BUCKET: cialli-assets
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_FORCE_PATH_STYLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8055/server/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "127.0.0.1:8055:8055"
    volumes:
      - directus_extensions:/directus/extensions
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:
  directus_extensions:
